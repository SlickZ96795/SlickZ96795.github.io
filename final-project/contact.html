  <main>
    <h1>Contact Us</h1>
    <p>Send us a message for lawn care services.</p>

    <form>
      <fieldset>
        <legend>Your Information</legend>

        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
      </fieldset>

      <fieldset>
        <legend>Service Request</legend>

        <label for="service">Select Service:</label><br>
        <select id="service" name="service">
          <option>Grass Cutting</option>
          <option>Yard Cleanup</option>
          <option>Other</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br><br>

        <label>
          <input type="checkbox" required>
          I agree to the privacy policy
        </label>
      </fieldset>

      <p>Your information will not be shared.</p>

      <button type="submit">Submit</button>
    </form>
  </main>
